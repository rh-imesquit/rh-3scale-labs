apiVersion: apps.3scale.net/v1alpha1
kind: APIManager
metadata:
  name: apimanager
  namespace: 3scale-lab
spec:
  wildcardDomain: apps.cluster-szqvf.szqvf.sandbox3501.opentlc.com
  system:
    fileStorage:
      simpleStorageService:
        configurationSecretRef:
          name: aws-auth-secret
    database:
      mysql:
        persistentVolumeClaim:
          storageClassName: gp3-csi
    redisPersistentVolumeClaim:
      storageClassName: gp3-csi
  backend:
    redisPersistentVolumeClaim:
      storageClassName: gp3-csi